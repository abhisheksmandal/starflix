version: 0.2
phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
  build:
    commands:
      - docker build --build-arg VITE_API_URL="$VITE_API_URL" -t $ECR_REPO_URL:$IMAGE_TAG -t $ECR_REPO_URL:latest ./frontend
  post_build:
    commands:
      - docker push $ECR_REPO_URL:$IMAGE_TAG
      - docker push $ECR_REPO_URL:latest
      - |
        SERVICE_STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query 'services[0].status' --output text 2>/dev/null || echo "NONE")
        if [ "$SERVICE_STATUS" = "ACTIVE" ] && aws ecs describe-task-definition --task-definition $TASK_FAMILY --region $AWS_REGION > current-task-def.json 2>/dev/null; then
          jq --arg IMAGE "$ECR_REPO_URL:$IMAGE_TAG" '
            .taskDefinition.containerDefinitions[0].image = $IMAGE
            | .taskDefinition
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ' current-task-def.json > new-task-def.json
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --region $AWS_REGION --cli-input-json file://new-task-def.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TASK_DEF_ARN"
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $NEW_TASK_DEF_ARN --region $AWS_REGION
        else
          echo "Service $ECS_SERVICE not ACTIVE yet (status: $SERVICE_STATUS); initial seed build, skipping deploy."
        fi
