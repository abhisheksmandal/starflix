services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starflix-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    ports:
      - "4000:4000"
    networks:
      - starflix-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: starflix-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - starflix-net

networks:
  starflix-net:
    driver: bridge
